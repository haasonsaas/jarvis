services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis
    env_file:
      - .env
    volumes:
      - jarvis-data:/root/.jarvis
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "jarvis", "--sim", "--no-vision"]

volumes:
  jarvis-data:

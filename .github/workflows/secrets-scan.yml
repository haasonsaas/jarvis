name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch:

concurrency:
  group: secrets-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.0"
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL -o "${archive}" "${base_url}/${archive}"
          curl -sSfL -o checksums.txt "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks scan
        run: |
          set -euo pipefail
          mkdir -p .artifacts/security
          gitleaks git --redact --gitleaks-ignore-path .gitleaksignore --report-format sarif --report-path .artifacts/security/gitleaks.sarif

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gitleaks-${{ github.run_id }}
          path: .artifacts/security/gitleaks.sarif
          if-no-files-found: warn

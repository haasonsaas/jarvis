name: Nightly Soak

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  soak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Soak subset
        run: make test-soak

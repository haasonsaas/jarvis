name: Fault Profiles

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      profile:
        description: "Fault profile to run"
        type: choice
        default: all
        options:
          - all
          - quick
          - network
          - storage
          - contract
          - chaos

concurrency:
  group: fault-profiles-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fault-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile != 'all' && fromJSON(format('["{0}"]', github.event.inputs.profile)) || fromJSON('["quick","network","storage","contract","chaos"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run fault profile
        run: |
          set -euo pipefail
          mkdir -p .artifacts/fault-profiles
          if [[ "${{ matrix.profile }}" == "chaos" ]]; then
            ./scripts/test_fault_chaos.sh quick,network,storage,contract 2 | tee ".artifacts/fault-profiles/${{ matrix.profile }}.log"
          else
            ./scripts/run_fault_profiles.sh "${{ matrix.profile }}" | tee ".artifacts/fault-profiles/${{ matrix.profile }}.log"
          fi

      - name: Upload profile artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fault-profile-${{ matrix.profile }}-${{ github.run_id }}
          path: .artifacts/fault-profiles/${{ matrix.profile }}.log
          if-no-files-found: warn
